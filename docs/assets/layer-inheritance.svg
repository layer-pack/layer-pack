    <line x1="0" y1="280" x2="820" y2="280"/><line x1="0" y1="320" x2="820" y2="320"/>
    <line x1="0" y1="360" x2="820" y2="360"/><line x1="0" y1="400" x2="820" y2="400"/>
    <line x1="0" y1="440" x2="820" y2="440"/><line x1="0" y1="480" x2="820" y2="480"/>
    <line x1="0" y1="520" x2="820" y2="520"/><line x1="0" y1="560" x2="820" y2="560"/>
