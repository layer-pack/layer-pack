<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 540">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1b2d"/>
      <stop offset="100%" stop-color="#152238"/>
    </linearGradient>
  </defs>

  <rect width="780" height="540" rx="16" fill="url(#bg)"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- LAYER CHAIN PILL (top)                 -->
  <!-- ═══════════════════════════════════════ -->
  <g transform="translate(115, 12)">
    <rect width="550" height="32" rx="16" fill="#0d1520" stroke="#1e3a5f" stroke-width="1"/>
    <text x="18" y="21" font-family="sans-serif" font-size="11" fill="#546e7a">Inheritable layers:</text>
    <rect x="128" y="6" width="85" height="20" rx="10" fill="#ff9800" fill-opacity="0.12" stroke="#ff9800" stroke-opacity="0.3"/>
    <text x="147" y="20" font-family="sans-serif" font-size="11" fill="#ffb74d">base-layer</text>
    <text x="222" y="21" font-family="sans-serif" font-size="13" fill="#37474f">→</text>
    <rect x="240" y="6" width="95" height="20" rx="10" fill="#ab47bc" fill-opacity="0.12" stroke="#ab47bc" stroke-opacity="0.3"/>
    <text x="255" y="20" font-family="sans-serif" font-size="11" fill="#ce93d8">lpack-react</text>
    <text x="344" y="21" font-family="sans-serif" font-size="13" fill="#37474f">→</text>
    <rect x="362" y="6" width="62" height="20" rx="10" fill="#00bcd4" fill-opacity="0.15" stroke="#00bcd4" stroke-opacity="0.4"/>
    <text x="373" y="20" font-family="sans-serif" font-size="11" fill="#4fc3f7" font-weight="600">my-app</text>
    <text x="434" y="21" font-family="sans-serif" font-size="10" fill="#546e7a">(head project)</text>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- SOURCE CODEBASE CARD                   -->
  <!-- ═══════════════════════════════════════ -->
  <g transform="translate(30, 56)">
    <rect width="720" height="210" rx="14" fill="#111827" stroke="#1e3a5f" stroke-width="1.5"/>

    <!-- Header bar -->
    <rect width="720" height="38" rx="14" fill="#0d1520"/>
    <rect y="24" width="720" height="14" fill="#0d1520"/>
    <text x="20" y="26" font-family="monospace" font-size="14" fill="#e0e0e0" font-weight="600">my-app / App/</text>
    <text x="165" y="26" font-family="sans-serif" font-size="12" fill="#546e7a">— single source tree, all build targets</text>

    <!-- Row 1: directories -->
    <g transform="translate(20, 52)">
      <!-- components/ (www + ssr) -->
      <g>
        <rect width="162" height="55" rx="8" fill="#002a2e" stroke="#00bcd4" stroke-width="1" stroke-opacity="0.5"/>
        <circle cx="14" cy="14" r="4" fill="#00bcd4"/>
        <text x="24" y="18" font-family="monospace" font-size="12" fill="#80deea">components/</text>
        <text x="14" y="38" font-family="sans-serif" font-size="10" fill="#546e7a">React UI</text>
        <text x="14" y="50" font-family="sans-serif" font-size="9" fill="#00bcd4" fill-opacity="0.7">used by :www :ssr</text>
      </g>
      <!-- api/ -->
      <g transform="translate(175, 0)">
        <rect width="162" height="55" rx="8" fill="#071a07" stroke="#66bb6a" stroke-width="1" stroke-opacity="0.5"/>
        <circle cx="14" cy="14" r="4" fill="#66bb6a"/>
        <text x="24" y="18" font-family="monospace" font-size="12" fill="#a5d6a7">api/</text>
        <text x="14" y="38" font-family="sans-serif" font-size="10" fill="#546e7a">Express routes</text>
        <text x="14" y="50" font-family="sans-serif" font-size="9" fill="#66bb6a" fill-opacity="0.7">used by :api</text>
      </g>
      <!-- models/ (shared) -->
      <g transform="translate(350, 0)">
        <rect width="162" height="55" rx="8" fill="#1a1700" stroke="#ffb300" stroke-width="1" stroke-opacity="0.5"/>
        <circle cx="14" cy="14" r="4" fill="#ffb300"/>
        <text x="24" y="18" font-family="monospace" font-size="12" fill="#ffe082">models/</text>
        <text x="14" y="38" font-family="sans-serif" font-size="10" fill="#546e7a">Data models</text>
        <text x="14" y="50" font-family="sans-serif" font-size="9" fill="#ffb300" fill-opacity="0.7">shared by all</text>
      </g>
      <!-- utils/ (shared) -->
      <g transform="translate(525, 0)">
        <rect width="162" height="55" rx="8" fill="#1a1700" stroke="#ffb300" stroke-width="1" stroke-opacity="0.5"/>
        <circle cx="14" cy="14" r="4" fill="#ffb300"/>
        <text x="24" y="18" font-family="monospace" font-size="12" fill="#ffe082">utils/</text>
        <text x="14" y="38" font-family="sans-serif" font-size="10" fill="#546e7a">Shared helpers</text>
        <text x="14" y="50" font-family="sans-serif" font-size="9" fill="#ffb300" fill-opacity="0.7">shared by all</text>
      </g>
    </g>

    <!-- Row 2: entry points -->
    <g transform="translate(20, 120)">
      <!-- index.js (www) -->
      <g>
        <rect width="162" height="42" rx="8" fill="#002a2e" stroke="#00bcd4" stroke-width="1" stroke-opacity="0.35"/>
        <text x="14" y="18" font-family="monospace" font-size="12" fill="#80deea">index.js</text>
        <text x="14" y="34" font-family="sans-serif" font-size="10" fill="#546e7a">www entry point</text>
      </g>
      <!-- server.js (api) -->
      <g transform="translate(175, 0)">
        <rect width="162" height="42" rx="8" fill="#071a07" stroke="#66bb6a" stroke-width="1" stroke-opacity="0.35"/>
        <text x="14" y="18" font-family="monospace" font-size="12" fill="#a5d6a7">server.js</text>
        <text x="14" y="34" font-family="sans-serif" font-size="10" fill="#546e7a">api entry point</text>
      </g>
      <!-- server.ssr.js -->
      <g transform="translate(350, 0)">
        <rect width="162" height="42" rx="8" fill="#1a0a2e" stroke="#ab47bc" stroke-width="1" stroke-opacity="0.35"/>
        <text x="14" y="18" font-family="monospace" font-size="12" fill="#ce93d8">server.ssr.js</text>
        <text x="14" y="34" font-family="sans-serif" font-size="10" fill="#546e7a">SSR entry point</text>
      </g>
      <!-- .layers.json -->
      <g transform="translate(525, 0)">
        <rect width="162" height="42" rx="8" fill="#0d1520" stroke="#546e7a" stroke-width="1" stroke-opacity="0.35"/>
        <text x="14" y="18" font-family="monospace" font-size="12" fill="#90a4ae">.layers.json</text>
        <text x="14" y="34" font-family="sans-serif" font-size="10" fill="#546e7a">3 build profiles</text>
      </g>
    </g>

    <!-- Shared code indicator -->
    <g transform="translate(20, 178)">
      <rect width="680" height="22" rx="6" fill="#ffb300" fill-opacity="0.05" stroke="#ffb300" stroke-width="0.5" stroke-opacity="0.2"/>
      <circle cx="14" cy="11" r="3.5" fill="#ffb300" fill-opacity="0.5"/>
      <text x="26" y="15" font-family="sans-serif" font-size="10" fill="#ffb300" fill-opacity="0.8">models/ and utils/ are imported by every build target — write once, use everywhere</text>
    </g>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- PROFILE ARROWS                          -->
  <!-- ═══════════════════════════════════════ -->
  <!-- :www arrow (centered over card 1: x=30+115=145) -->
  <g transform="translate(85, 278)">
    <line x1="60" y1="0" x2="60" y2="52" stroke="#00bcd4" stroke-width="2" stroke-dasharray="4 2"/>
    <polygon points="52,48 60,62 68,48" fill="#00bcd4"/>
    <rect x="10" y="14" width="100" height="24" rx="12" fill="#00bcd4" fill-opacity="0.12" stroke="#00bcd4" stroke-opacity="0.4" stroke-width="1"/>
    <text x="60" y="31" text-anchor="middle" font-family="monospace" font-size="11" fill="#00bcd4" font-weight="600">lpack :www</text>
  </g>

  <!-- :api arrow (centered over card 2: x=275+115=390) -->
  <g transform="translate(330, 278)">
    <line x1="60" y1="0" x2="60" y2="52" stroke="#66bb6a" stroke-width="2" stroke-dasharray="4 2"/>
    <polygon points="52,48 60,62 68,48" fill="#66bb6a"/>
    <rect x="12" y="14" width="96" height="24" rx="12" fill="#66bb6a" fill-opacity="0.12" stroke="#66bb6a" stroke-opacity="0.4" stroke-width="1"/>
    <text x="60" y="31" text-anchor="middle" font-family="monospace" font-size="11" fill="#66bb6a" font-weight="600">lpack :api</text>
  </g>

  <!-- :ssr arrow (centered over card 3: x=520+115=635) -->
  <g transform="translate(575, 278)">
    <line x1="60" y1="0" x2="60" y2="52" stroke="#ab47bc" stroke-width="2" stroke-dasharray="4 2"/>
    <polygon points="52,48 60,62 68,48" fill="#ab47bc"/>
    <rect x="14" y="14" width="92" height="24" rx="12" fill="#ab47bc" fill-opacity="0.12" stroke="#ab47bc" stroke-opacity="0.4" stroke-width="1"/>
    <text x="60" y="31" text-anchor="middle" font-family="monospace" font-size="11" fill="#ab47bc" font-weight="600">lpack :ssr</text>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- OUTPUT CARDS                            -->
  <!-- ═══════════════════════════════════════ -->
  <!-- www output -->
  <g transform="translate(30, 350)">
    <rect width="230" height="140" rx="12" fill="#111827" stroke="#00bcd4" stroke-width="2"/>
    <rect width="230" height="5" rx="3" fill="#00bcd4"/>
    <!-- Browser icon -->
    <rect x="18" y="18" width="22" height="16" rx="3" fill="none" stroke="#00bcd4" stroke-width="1.2"/>
    <line x1="18" y1="24" x2="40" y2="24" stroke="#00bcd4" stroke-width="0.8"/>
    <circle cx="22" cy="21" r="1.2" fill="#00bcd4"/>
    <circle cx="26" cy="21" r="1.2" fill="#00bcd4"/>
    <text x="50" y="30" font-family="sans-serif" font-size="14" fill="#4fc3f7" font-weight="700">Frontend Bundle</text>
    <text x="18" y="52" font-family="sans-serif" font-size="11" fill="#7a8a9e">React SPA for browsers</text>
    <text x="18" y="72" font-family="monospace" font-size="11" fill="#37474f">dist/www/</text>
    <!-- Included modules -->
    <g transform="translate(18, 86)">
      <rect width="68" height="18" rx="9" fill="#00bcd4" fill-opacity="0.1"/>
      <text x="8" y="13" font-family="sans-serif" font-size="9" fill="#00bcd4">components</text>
      <rect x="76" width="50" height="18" rx="9" fill="#ffb300" fill-opacity="0.1"/>
      <text x="84" y="13" font-family="sans-serif" font-size="9" fill="#ffb300">models</text>
      <rect x="134" width="42" height="18" rx="9" fill="#ffb300" fill-opacity="0.1"/>
      <text x="142" y="13" font-family="sans-serif" font-size="9" fill="#ffb300">utils</text>
    </g>
    <text x="18" y="124" font-family="sans-serif" font-size="10" fill="#37474f">JS + CSS + assets bundle</text>
  </g>

  <!-- api output -->
  <g transform="translate(275, 350)">
    <rect width="230" height="140" rx="12" fill="#111827" stroke="#66bb6a" stroke-width="2"/>
    <rect width="230" height="5" rx="3" fill="#66bb6a"/>
    <!-- Server icon -->
    <rect x="18" y="16" width="22" height="18" rx="3" fill="none" stroke="#66bb6a" stroke-width="1.2"/>
    <line x1="22" y1="22" x2="24" y2="22" stroke="#66bb6a" stroke-width="2" stroke-linecap="round"/>
    <line x1="28" y1="22" x2="36" y2="22" stroke="#66bb6a" stroke-width="1"/>
    <line x1="22" y1="28" x2="24" y2="28" stroke="#66bb6a" stroke-width="2" stroke-linecap="round"/>
    <line x1="28" y1="28" x2="36" y2="28" stroke="#66bb6a" stroke-width="1"/>
    <text x="50" y="30" font-family="sans-serif" font-size="14" fill="#a5d6a7" font-weight="700">API Server</text>
    <text x="18" y="52" font-family="sans-serif" font-size="11" fill="#7a8a9e">Express + Node.js backend</text>
    <text x="18" y="72" font-family="monospace" font-size="11" fill="#37474f">dist/api/</text>
    <!-- Included modules -->
    <g transform="translate(18, 86)">
      <rect width="58" height="18" rx="9" fill="#66bb6a" fill-opacity="0.1"/>
      <text x="8" y="13" font-family="sans-serif" font-size="9" fill="#66bb6a">api routes</text>
      <rect x="66" width="50" height="18" rx="9" fill="#ffb300" fill-opacity="0.1"/>
      <text x="74" y="13" font-family="sans-serif" font-size="9" fill="#ffb300">models</text>
      <rect x="124" width="42" height="18" rx="9" fill="#ffb300" fill-opacity="0.1"/>
      <text x="132" y="13" font-family="sans-serif" font-size="9" fill="#ffb300">utils</text>
    </g>
    <text x="18" y="124" font-family="sans-serif" font-size="10" fill="#37474f">Node.js bundle, externals</text>
  </g>

  <!-- ssr output -->
  <g transform="translate(520, 350)">
    <rect width="230" height="140" rx="12" fill="#111827" stroke="#ab47bc" stroke-width="2"/>
    <rect width="230" height="5" rx="3" fill="#ab47bc"/>
    <!-- SSR icon -->
    <rect x="18" y="16" width="22" height="18" rx="3" fill="none" stroke="#ab47bc" stroke-width="1.2"/>
    <text x="22" y="29" font-family="monospace" font-size="8" fill="#ab47bc">&lt;/&gt;</text>
    <text x="50" y="30" font-family="sans-serif" font-size="14" fill="#ce93d8" font-weight="700">SSR Renderer</text>
    <text x="18" y="52" font-family="sans-serif" font-size="11" fill="#7a8a9e">Server-rendered React</text>
    <text x="18" y="72" font-family="monospace" font-size="11" fill="#37474f">dist/ssr/</text>
    <!-- Included modules -->
    <g transform="translate(18, 86)">
      <rect width="68" height="18" rx="9" fill="#ab47bc" fill-opacity="0.1"/>
      <text x="8" y="13" font-family="sans-serif" font-size="9" fill="#ab47bc">components</text>
      <rect x="76" width="50" height="18" rx="9" fill="#ffb300" fill-opacity="0.1"/>
      <text x="84" y="13" font-family="sans-serif" font-size="9" fill="#ffb300">models</text>
      <rect x="134" width="42" height="18" rx="9" fill="#ffb300" fill-opacity="0.1"/>
      <text x="142" y="13" font-family="sans-serif" font-size="9" fill="#ffb300">utils</text>
    </g>
    <text x="18" y="124" font-family="sans-serif" font-size="10" fill="#37474f">Express + hydrated client</text>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- FOOTER                                  -->
  <!-- ═══════════════════════════════════════ -->
  <g transform="translate(140, 505)">
    <rect width="500" height="26" rx="13" fill="#0d1520" stroke="#1e3a5f" stroke-width="0.5"/>
    <text x="250" y="17" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#546e7a">Three builds from one source tree — shared code is never duplicated</text>
  </g>
</svg>
