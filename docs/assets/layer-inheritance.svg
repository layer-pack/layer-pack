    <tspan x="152" y="488" fill="#adb5bd">App/components/Button.jsx (base)</tspan>
    <tspan x="152" y="506" fill="#adb5bd">App/utils/api.js</tspan>
    <tspan x="152" y="524" fill="#adb5bd">common webpack config</tspan>
  </text>
