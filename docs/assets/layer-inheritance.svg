  <!-- Content -->
  <text font-family="monospace" font-size="12" fill="#ce93d8">
    <tspan x="152" y="280">webpack configs (www, api, static)</tspan>
    <tspan x="152" y="298" fill="#adb5bd">React 18, Sass, Express, SSR</tspan>
    <tspan x="152" y="316" fill="#adb5bd">Babel presets, HMR, loaders</tspan>
    <tspan x="152" y="334" fill="#adb5bd">App/index.client.js, App/index.server.js</tspan>
  </text>
  <!-- Badges -->
  <rect x="420" y="272" width="100" height="24" rx="4" fill="#7c4dff" fill-opacity="0.1" stroke="#7c4dff" stroke-opacity="0.3"/>
  <text x="441" y="288" font-family="sans-serif" font-size="11" fill="#b388ff">configs</text>
  <rect x="420" y="302" width="100" height="24" rx="4" fill="#7c4dff" fill-opacity="0.1" stroke="#7c4dff" stroke-opacity="0.3"/>
  <text x="443" y="318" font-family="sans-serif" font-size="11" fill="#b388ff">loaders</text>

  <!-- Arrow 2 -->
  <line x1="330" y1="360" x2="330" y2="400" stroke="#b388ff" stroke-width="2"/>
  <polygon points="324,400 330,412 336,400" fill="#b388ff"/>
  <rect x="280" y="370" width="100" height="22" rx="11" fill="#0d2137" stroke="#b388ff" stroke-width="1"/>
  <text x="302" y="385" font-family="sans-serif" font-size="11" fill="#b388ff" font-weight="600">extends</text>

