  <!-- Star icon -->
  <circle cx="152" cy="58" r="12" fill="#00bcd4" fill-opacity="0.15"/>
  <path d="M152,48 l2.5,5 5.5,0.8 -4,3.9 0.9,5.3 -4.9,-2.6 -4.9,2.6 0.9,-5.3 -4,-3.9 5.5,-0.8z" fill="#4fc3f7"/>
  <!-- Title -->
  <text x="172" y="62" font-family="sans-serif" font-size="16" fill="#4fc3f7" font-weight="700">Your Project</text>
  <text x="310" y="62" font-family="sans-serif" font-size="12" fill="#4fc3f7" opacity="0.6">HEAD - wins all conflicts</text>
  <!-- Content lines -->
  <text font-family="monospace" font-size="12" fill="#8ecae6">
    <tspan x="152" y="90">.layers.json</tspan>
    <tspan x="152" y="108" fill="#adb5bd">App/components/Button.jsx</tspan>
    <tspan x="152" y="126" fill="#adb5bd">App/pages/Home.jsx</tspan>
    <tspan x="152" y="144" fill="#adb5bd">webpack.config.js</tspan>
  </text>
