  <circle cx="152" cy="438" r="12" fill="#ff6d00" fill-opacity="0.15"/>
  <rect x="144" y="434" width="16" height="3" rx="1" fill="#ffab40"/>
  <rect x="142" y="439" width="20" height="3" rx="1" fill="#ffab40"/>
  <rect x="140" y="444" width="24" height="3" rx="1" fill="#ffab40"/>
