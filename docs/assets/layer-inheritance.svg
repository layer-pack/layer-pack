  <rect x="420" y="462" width="100" height="24" rx="4" fill="#ff6d00" fill-opacity="0.1" stroke="#ff6d00" stroke-opacity="0.3"/>
  <text x="440" y="478" font-family="sans-serif" font-size="11" fill="#ffab40">fallback</text>
  <rect x="420" y="492" width="100" height="24" rx="4" fill="#ff6d00" fill-opacity="0.1" stroke="#ff6d00" stroke-opacity="0.3"/>
  <text x="443" y="508" font-family="sans-serif" font-size="11" fill="#ffab40">shared</text>

  <!-- ═══ RIGHT PANEL: Resolution ═══ -->
  <rect x="580" y="60" width="200" height="500" rx="12" fill="#0a1628" stroke="#1e3a5f" stroke-width="1"/>
  <text x="600" y="90" font-family="sans-serif" font-size="13" fill="#4fc3f7" font-weight="700" letter-spacing="1">RESOLUTION</text>

  <!-- Import example -->
  <rect x="592" y="108" width="176" height="32" rx="6" fill="#122240"/>
  <text x="602" y="129" font-family="monospace" font-size="10" fill="#8ecae6">import "App/Button"</text>

  <!-- Step 1 -->
  <line x1="680" y1="140" x2="680" y2="160" stroke="#4fc3f7" stroke-width="1.5" stroke-dasharray="4 3"/>
  <circle cx="680" cy="175" r="13" fill="#00bcd4" fill-opacity="0.2" stroke="#00bcd4" stroke-width="1.5"/>
  <text x="675" y="180" font-family="sans-serif" font-size="12" fill="#4fc3f7" font-weight="700">1</text>
  <text x="700" y="180" font-family="sans-serif" font-size="11" fill="#e0e0e0">Check head</text>
  <rect x="600" y="192" width="168" height="22" rx="4" fill="#00bcd4" fill-opacity="0.1"/>
  <text x="610" y="207" font-family="monospace" font-size="10" fill="#4fc3f7">App/Button.jsx  FOUND</text>

  <!-- Step 2 -->
  <line x1="680" y1="218" x2="680" y2="238" stroke="#b388ff" stroke-width="1.5" stroke-dasharray="4 3"/>
  <circle cx="680" cy="253" r="13" fill="#7c4dff" fill-opacity="0.2" stroke="#7c4dff" stroke-width="1.5"/>
  <text x="675" y="258" font-family="sans-serif" font-size="12" fill="#b388ff" font-weight="700">2</text>
  <text x="700" y="258" font-family="sans-serif" font-size="11" fill="#e0e0e0">lpack-react</text>
  <rect x="600" y="270" width="168" height="22" rx="4" fill="#7c4dff" fill-opacity="0.08"/>
  <text x="610" y="285" font-family="monospace" font-size="10" fill="#666">skipped (head won)</text>

  <!-- Step 3 -->
  <line x1="680" y1="296" x2="680" y2="316" stroke="#ffab40" stroke-width="1.5" stroke-dasharray="4 3"/>
  <circle cx="680" cy="331" r="13" fill="#ff6d00" fill-opacity="0.2" stroke="#ff6d00" stroke-width="1.5"/>
  <text x="675" y="336" font-family="sans-serif" font-size="12" fill="#ffab40" font-weight="700">3</text>
  <text x="700" y="336" font-family="sans-serif" font-size="11" fill="#e0e0e0">base-layer</text>
  <rect x="600" y="348" width="168" height="22" rx="4" fill="#ff6d00" fill-opacity="0.08"/>
  <text x="610" y="363" font-family="monospace" font-size="10" fill="#666">skipped (head won)</text>

  <!-- Separator -->
  <line x1="600" y1="386" x2="768" y2="386" stroke="#1e3a5f" stroke-width="1"/>

  <!-- $super example -->
  <rect x="592" y="400" width="176" height="32" rx="6" fill="#122240"/>
  <text x="602" y="421" font-family="monospace" font-size="10" fill="#ce93d8">import "$super"</text>
  <text x="602" y="450" font-family="sans-serif" font-size="10" fill="#adb5bd">from head/App/Button.jsx:</text>
  <text x="602" y="466" font-family="sans-serif" font-size="10" fill="#b388ff">--> resolves to parent layer</text>
  <text x="602" y="482" font-family="sans-serif" font-size="10" fill="#b388ff">    App/Button.jsx (skips head)</text>

  <!-- Glob example -->
  <line x1="680" y1="492" x2="680" y2="508" stroke="#fff" stroke-width="1" stroke-dasharray="2 2" opacity="0.2"/>
  <rect x="592" y="512" width="176" height="32" rx="6" fill="#122240"/>
  <text x="602" y="533" font-family="monospace" font-size="10" fill="#8ecae6">import "App/ui/(*).js"</text>

  <!-- Bottom result bar -->
  <rect x="120" y="568" width="420" height="32" rx="8" fill="#122240" stroke="#1e3a5f" stroke-width="1"/>
  <text x="140" y="589" font-family="sans-serif" font-size="12" fill="#adb5bd">
    <tspan fill="#4fc3f7" font-weight="600">Result:</tspan> First match wins. Vars merge (head overrides parents).
  </text>
</svg>
