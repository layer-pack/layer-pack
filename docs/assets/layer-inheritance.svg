<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1b2d"/>
      <stop offset="100%" stop-color="#152238"/>
    </linearGradient>
  </defs>

  <rect width="700" height="520" rx="16" fill="url(#bg)"/>

  <!-- ════════════════════════════════════════════════ -->
  <!-- LAYER 3 (bottom): base-layer — drawn first so it's behind -->
  <!-- ════════════════════════════════════════════════ -->
  <g transform="translate(60, 310)">
    <!-- Card -->
    <rect width="400" height="150" rx="14" fill="#1a1a2e" stroke="#ff9800" stroke-width="2" stroke-opacity="0.5"/>
    <rect width="400" height="5" rx="3" fill="#ff9800" fill-opacity="0.7"/>
    <!-- Label -->
    <text x="20" y="35" font-family="sans-serif" font-size="18" fill="#ffb74d" font-weight="700">base-layer</text>
    <text x="170" y="35" font-family="sans-serif" font-size="12" fill="#ffb74d" fill-opacity="0.5">npm package</text>
    <!-- Files -->
    <g transform="translate(20, 55)">
      <!-- Button.jsx — will be overridden -->
      <rect width="160" height="32" rx="6" fill="#2a1a00" stroke="#ff9800" stroke-width="1" stroke-opacity="0.3"/>
      <text x="12" y="21" font-family="monospace" font-size="12" fill="#ffcc80">App/Button.jsx</text>
      <!-- webpack config — inherited -->
      <rect x="180" width="190" height="32" rx="6" fill="#2a1a00" stroke="#ff9800" stroke-width="1" stroke-opacity="0.3"/>
      <text x="192" y="21" font-family="monospace" font-size="12" fill="#ffcc80">webpack.config.js</text>
    </g>
    <!-- Inherited label -->
    <rect x="20" y="105" width="170" height="26" rx="13" fill="#ff9800" fill-opacity="0.1" stroke="#ff9800" stroke-opacity="0.25"/>
    <text x="34" y="122" font-family="sans-serif" font-size="11" fill="#ffb74d">webpack config inherited</text>
  </g>

  <!-- ════════════════════════════════════════════════ -->
  <!-- LAYER 2 (middle): lpack-react -->
  <!-- ════════════════════════════════════════════════ -->
  <g transform="translate(40, 175)">
    <rect width="440" height="150" rx="14" fill="#1a1a2e" stroke="#9c27b0" stroke-width="2" stroke-opacity="0.5"/>
    <rect width="440" height="5" rx="3" fill="#9c27b0" fill-opacity="0.7"/>
    <text x="20" y="35" font-family="sans-serif" font-size="18" fill="#ce93d8" font-weight="700">lpack-react</text>
    <text x="155" y="35" font-family="sans-serif" font-size="12" fill="#ce93d8" fill-opacity="0.5">React + Webpack + SSR</text>
    <!-- Files -->
    <g transform="translate(20, 55)">
      <rect width="160" height="32" rx="6" fill="#1a0a2e" stroke="#9c27b0" stroke-width="1" stroke-opacity="0.3"/>
      <text x="12" y="21" font-family="monospace" font-size="12" fill="#e1bee7">App/Button.jsx</text>
      <rect x="180" width="230" height="32" rx="6" fill="#1a0a2e" stroke="#9c27b0" stroke-width="1" stroke-opacity="0.3"/>
      <text x="192" y="21" font-family="monospace" font-size="12" fill="#e1bee7">App/index.server.js</text>
    </g>
    <rect x="20" y="105" width="140" height="26" rx="13" fill="#9c27b0" fill-opacity="0.1" stroke="#9c27b0" stroke-opacity="0.25"/>
    <text x="34" y="122" font-family="sans-serif" font-size="11" fill="#ce93d8">SSR + HMR inherited</text>
  </g>

  <!-- ════════════════════════════════════════════════ -->
  <!-- LAYER 1 (top): Your Project — drawn last so it's on top -->
  <!-- ════════════════════════════════════════════════ -->
  <g transform="translate(20, 40)">
    <rect width="480" height="150" rx="14" fill="#1a1a2e" stroke="#00bcd4" stroke-width="2.5"/>
    <rect width="480" height="5" rx="3" fill="#00bcd4"/>
    <text x="20" y="35" font-family="sans-serif" font-size="18" fill="#4fc3f7" font-weight="700">my-app</text>
    <text x="100" y="35" font-family="sans-serif" font-size="12" fill="#4fc3f7" fill-opacity="0.5">your code — always wins</text>
    <!-- Files -->
    <g transform="translate(20, 55)">
      <!-- Button.jsx — overrides parent -->
      <rect width="160" height="32" rx="6" fill="#002a2e" stroke="#00bcd4" stroke-width="1.5"/>
      <text x="12" y="21" font-family="monospace" font-size="12" fill="#80deea">App/Button.jsx</text>
      <!-- Dashboard — unique to head -->
      <rect x="180" width="200" height="32" rx="6" fill="#002a2e" stroke="#00bcd4" stroke-width="1"/>
      <text x="192" y="21" font-family="monospace" font-size="12" fill="#80deea">App/Dashboard.jsx</text>
    </g>
    <!-- Override badge -->
    <rect x="20" y="105" width="106" height="26" rx="13" fill="#00bcd4" fill-opacity="0.15" stroke="#00bcd4" stroke-opacity="0.4"/>
    <text x="32" y="122" font-family="sans-serif" font-size="11" fill="#4fc3f7" font-weight="600">your Button</text>
  </g>

  <!-- ════════════════════════════════════════════════ -->
  <!-- "extends" arrows -->
  <!-- ════════════════════════════════════════════════ -->
  <!-- my-app → lpack-react -->
  <line x1="260" y1="142" x2="260" y2="175" stroke="#4fc3f7" stroke-width="1.5" opacity="0.5"/>
  <text x="270" y="163" font-family="sans-serif" font-size="10" fill="#4fc3f7" fill-opacity="0.7">extends</text>
  <!-- lpack-react → base-layer -->
  <line x1="280" y1="325" x2="280" y2="310" stroke="#ce93d8" stroke-width="1.5" opacity="0.5"/>
  <text x="290" y="322" font-family="sans-serif" font-size="10" fill="#ce93d8" fill-opacity="0.7">extends</text>

  <!-- ════════════════════════════════════════════════ -->
  <!-- RIGHT SIDE: The story -->
  <!-- ════════════════════════════════════════════════ -->
  <g transform="translate(500, 50)">
    <rect width="175" height="410" rx="12" fill="#0d1520" stroke="#1e3a5f" stroke-width="1"/>

    <!-- Title -->
    <text x="18" y="30" font-family="sans-serif" font-size="14" fill="#e0e0e0" font-weight="600">What happens</text>

    <!-- Story 1: Button override -->
    <rect x="12" y="48" width="150" height="24" rx="5" fill="#122240"/>
    <text x="20" y="65" font-family="monospace" font-size="10" fill="#80deea">import "App/Button"</text>

    <text x="18" y="92" font-family="sans-serif" font-size="11" fill="#4fc3f7" font-weight="600">Your version wins.</text>
    <text x="18" y="108" font-family="sans-serif" font-size="11" fill="#7a8a9e">Button.jsx exists in both</text>
    <text x="18" y="123" font-family="sans-serif" font-size="11" fill="#7a8a9e">layers, but head project</text>
    <text x="18" y="138" font-family="sans-serif" font-size="11" fill="#7a8a9e">files always come first.</text>

    <!-- Divider -->
    <line x1="18" y1="155" x2="157" y2="155" stroke="#1e3a5f" stroke-width="1"/>

    <!-- Story 2: Inherited file -->
    <rect x="12" y="170" width="150" height="24" rx="5" fill="#122240"/>
    <text x="20" y="187" font-family="monospace" font-size="10" fill="#e1bee7">import "App/index.server"</text>

    <text x="18" y="214" font-family="sans-serif" font-size="11" fill="#ce93d8" font-weight="600">Inherited from parent.</text>
    <text x="18" y="230" font-family="sans-serif" font-size="11" fill="#7a8a9e">You didn't write it, but</text>
    <text x="18" y="245" font-family="sans-serif" font-size="11" fill="#7a8a9e">lpack-react provides it.</text>
    <text x="18" y="260" font-family="sans-serif" font-size="11" fill="#7a8a9e">Zero config needed.</text>

    <!-- Divider -->
    <line x1="18" y1="277" x2="157" y2="277" stroke="#1e3a5f" stroke-width="1"/>

    <!-- Story 3: $super -->
    <rect x="12" y="292" width="150" height="24" rx="5" fill="#122240"/>
    <text x="20" y="309" font-family="monospace" font-size="10" fill="#ce93d8">import "$super"</text>

    <text x="18" y="336" font-family="sans-serif" font-size="11" fill="#ffb74d" font-weight="600">Access parent version.</text>
    <text x="18" y="352" font-family="sans-serif" font-size="11" fill="#7a8a9e">Override a file AND still</text>
    <text x="18" y="367" font-family="sans-serif" font-size="11" fill="#7a8a9e">use the original — like</text>
    <text x="18" y="382" font-family="sans-serif" font-size="11" fill="#7a8a9e">calling super() in OOP.</text>
  </g>
</svg>
