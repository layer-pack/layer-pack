  <rect x="120" y="220" width="420" height="140" rx="12" fill="#0d2137" stroke="url(#midGrad)" stroke-width="2"/>
  <rect x="120" y="220" width="420" height="6" rx="3" fill="url(#midGrad)"/>
  <!-- Package icon -->
  <circle cx="152" cy="248" r="12" fill="#7c4dff" fill-opacity="0.15"/>
  <rect x="143" y="242" width="18" height="14" rx="2" fill="none" stroke="#b388ff" stroke-width="1.5"/>
  <line x1="143" y1="246" x2="161" y2="246" stroke="#b388ff" stroke-width="1.5"/>
  <line x1="152" y1="242" x2="152" y2="246" stroke="#b388ff" stroke-width="1.5"/>
