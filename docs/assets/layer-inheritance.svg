  <rect x="420" y="82" width="100" height="24" rx="4" fill="#00bcd4" fill-opacity="0.1" stroke="#00bcd4" stroke-opacity="0.3"/>
  <text x="435" y="98" font-family="sans-serif" font-size="11" fill="#4fc3f7">overrides</text>
  <rect x="420" y="112" width="100" height="24" rx="4" fill="#00bcd4" fill-opacity="0.1" stroke="#00bcd4" stroke-opacity="0.3"/>
  <text x="428" y="128" font-family="sans-serif" font-size="11" fill="#4fc3f7">custom vars</text>

  <!-- Arrow 1 -->
  <line x1="330" y1="170" x2="330" y2="210" stroke="#4fc3f7" stroke-width="2"/>
  <polygon points="324,210 330,222 336,210" fill="#4fc3f7"/>
  <rect x="280" y="180" width="100" height="22" rx="11" fill="#0d2137" stroke="#4fc3f7" stroke-width="1"/>
  <text x="302" y="195" font-family="sans-serif" font-size="11" fill="#4fc3f7" font-weight="600">extends</text>

